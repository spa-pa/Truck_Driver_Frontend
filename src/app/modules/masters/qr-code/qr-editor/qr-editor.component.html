<!-- src/app/components/qr-editor/qr-editor.component.html -->

<div class="qr-editor-container">
    <!-- Header -->
    <header class="editor-header">
        <div class="header-left">
            <h1>QR Editor</h1>
            <!-- <span class="version-badge">v2.0</span> -->
        </div>
        <div class="header-actions">
            <button class="btn-import" (click)="fileInput.click()">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
                    <polyline points="17 8 12 3 7 8" />
                    <line x1="12" y1="3" x2="12" y2="15" />
                </svg>
                Import
            </button>
            <input type="file" #fileInput accept=".json" style="display: none" (change)="importConfig($event)" />
            <button class="btn-export" (click)="exportConfig()">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
                    <polyline points="7 10 12 15 17 10" />
                    <line x1="12" y1="15" x2="12" y2="3" />
                </svg>
                Export
            </button>
            <button class="btn-reset" (click)="resetConfig()">Reset</button>
        </div>
    </header>

    <!-- Main Grid -->
    <div class="editor-grid">
        <!-- Left Panel - Controls -->
        <div class="controls-panel">
            <div class="panel-content">
                <h2>Configuration</h2>




                <!-- Terminal ID -->
                <div class="control-group">
                    <label for="terminalId">Terminal ID</label>
                    <input id="terminalId" type="number" class="control-input" [(ngModel)]="config.terminalId"
                        (change)="updateConfig()" min="1" [readonly]="true" />
                </div>

                <!-- QR Data -->
                <!-- <div class="control-group">
                    <label for="qrData">QR Data (JSON)</label>
                    <div class="textarea-wrapper">
                        <textarea id="qrData" class="control-textarea" rows="4" [(ngModel)]="config.data"
                            (input)="updateConfig()"></textarea>
                        <button class="btn-format" (click)="formatJSON()">Format</button>
                    </div>
                </div> -->

                <!-- QR Color -->
                <div class="control-group color-group">
                    <label>QR Color</label>
                    <div class="color-input-wrapper">
                        <input type="color" class="color-picker" [(ngModel)]="config.qrColor"
                            (change)="updateConfig()" />
                        <span class="color-hex">{{ config.qrColor }}</span>
                    </div>
                </div>

                <!-- Background Color -->
                <div class="control-group color-group">
                    <label>Background Color</label>
                    <div class="color-input-wrapper">
                        <input type="color" class="color-picker" [(ngModel)]="config.bgColor"
                            (change)="updateConfig()" />
                        <span class="color-hex">{{ config.bgColor }}</span>
                    </div>
                </div>

                <!-- QR Size -->
                <div class="control-group">
                    <label>QR Size</label>
                    <div class="range-wrapper">
                        <input type="range" class="control-range" min="150" max="500" step="10"
                            [(ngModel)]="config.qrSize" (change)="updateConfig()" />
                        <span class="range-value">{{ config.qrSize }}px</span>
                    </div>
                </div>

                <!-- Pattern -->
                <div class="control-group">
                    <label>QR Pattern</label>
                    <select class="control-select" [(ngModel)]="config.dotType" (change)="updateConfig()">
                        <option value="square">Square</option>
                        <option value="dots">Dots</option>
                        <option value="rounded">Rounded</option>
                        <option value="extra-rounded">Extra Rounded</option>
                        <option value="classy">Classy</option>
                        <option value="classy-rounded">Classy Rounded</option>
                    </select>
                </div>

                <!-- Logo -->
                <div class="control-group">
                    <label>Logo</label>
                    <div class="logo-upload-wrapper">
                        <input type="file" class="control-file" accept="image/*" (change)="onLogoUpload($event)"
                            #logoInput />
                        <button class="btn-upload" (click)="logoInput.click()">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2">
                                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
                                <polyline points="17 8 12 3 7 8" />
                                <line x1="12" y1="3" x2="12" y2="15" />
                            </svg>
                            Upload Logo
                        </button>
                        <button class="btn-remove-logo" *ngIf="config.logoUrl" (click)="removeLogo()">
                            ×
                        </button>
                    </div>
                    <div class="logo-preview" *ngIf="config.logoUrl">
                        <img [src]="config.logoUrl" alt="Logo" />
                    </div>
                </div>

                <!-- Text Settings -->
                <div class="control-group">
                    <label for="bottomText">Bottom Text</label>
                    <input id="bottomText" type="text" class="control-input" [(ngModel)]="config.bottomText"
                        (input)="updateConfig()" />
                </div>

                <div class="control-group">
                    <label>Text Size</label>
                    <div class="range-wrapper">
                        <input type="range" class="control-range" min="10" max="50" [(ngModel)]="config.textSize"
                            (change)="updateConfig()" />
                        <span class="range-value">{{ config.textSize }}px</span>
                    </div>
                </div>

                <div class="control-group color-group">
                    <label>Text Color</label>
                    <div class="color-input-wrapper">
                        <input type="color" class="color-picker" [(ngModel)]="config.textColor"
                            (change)="updateConfig()" />
                        <span class="color-hex">{{ config.textColor }}</span>
                    </div>
                </div>

                <div class="control-group">
                    <label>Font Family</label>
                    <select class="control-select" [(ngModel)]="config.fontFamily" (change)="updateConfig()">
                        <option value="Inter, system-ui, sans-serif">Inter</option>
                        <option value="Arial, sans-serif">Arial</option>
                        <option value="Verdana, sans-serif">Verdana</option>
                        <option value="Georgia, serif">Georgia</option>
                        <option value="'Courier New', monospace">Courier</option>
                    </select>
                </div>

                <div class="control-group">
                    <label>Font Weight</label>
                    <select class="control-select" [(ngModel)]="config.fontWeight" (change)="updateConfig()">
                        <option value="normal">Normal</option>
                        <option value="bold">Bold</option>
                    </select>
                </div>
            </div>
        </div>

        <!-- Right Panel - Preview -->
        <div class="preview-panel">
            <div class="preview-card">
                <app-qr-display #qrDisplay [config]="config" size="medium" [showText]="true"></app-qr-display>
            </div>

            <!-- Download Actions -->
            <div class="download-section">
                <h3>Download Options</h3>

                <div class="download-grid">
                    <button class="btn-download-png" (click)="downloadPNG()" [disabled]="isDownloading">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
                            <polyline points="7 10 12 15 17 10" />
                            <line x1="12" y1="15" x2="12" y2="3" />
                        </svg>
                        PNG
                    </button>

                    <button class="btn-download-jpg" (click)="downloadJPG()" [disabled]="isDownloading">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
                            <polyline points="7 10 12 15 17 10" />
                            <line x1="12" y1="15" x2="12" y2="3" />
                        </svg>
                        JPG
                    </button>

                    <button class="btn-download-pdf" (click)="downloadPDF()" [disabled]="isDownloading">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" />
                            <polyline points="14 2 14 8 20 8" />
                            <line x1="12" y1="18" x2="12" y2="12" />
                            <line x1="9" y1="15" x2="15" y2="15" />
                        </svg>
                        PDF
                    </button>

                    <button class="btn-download-svg" (click)="downloadSVG()" [disabled]="isDownloading">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <path d="M4 4L20 4" />
                            <path d="M4 20L20 20" />
                            <path d="M10 4L4 10" />
                            <path d="M14 4L20 10" />
                            <path d="M6 20L14 8" />
                            <path d="M18 20L10 8" />
                        </svg>
                        SVG
                    </button>

                    <button class="btn-print" (click)="printQR()" [disabled]="isDownloading">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <polyline points="6 9 6 2 18 2 18 9" />
                            <path d="M18 9H6" />
                            <rect x="6" y="14" width="12" height="8" />
                            <line x1="9" y1="18" x2="15" y2="18" />
                        </svg>
                        Print
                    </button>

                    <button class="btn-copy" (click)="copyQRToClipboard()" [disabled]="isDownloading">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <rect x="9" y="9" width="13" height="13" rx="2" ry="2" />
                            <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1" />
                        </svg>
                        Copy
                    </button>
                </div>

                <!-- Download Progress -->
                <div class="download-progress" *ngIf="isDownloading || downloadProgress">
                    <div class="progress-bar" [class.complete]="!isDownloading && downloadProgress">
                        <span>{{ downloadProgress || 'Processing...' }}</span>
                    </div>
                </div>
            </div>

            <!-- Response Display -->
            <!-- <div class="response-card">
                <div class="response-header">
                    <h3>Backend Response</h3>
                    <span class="status-badge" *ngIf="response">
                        <span class="status-dot"></span>
                        Active
                    </span>
                </div>
                <div class="response-content">
                    <pre>{{ getResponseJSON() }}</pre>
                </div>
            </div> -->
        </div>
    </div>
</div>
